<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UDATA WA">
<meta name="theme-color" content="#1a2e4a">
<title>UDATA — עוזר WhatsApp</title>

<!-- App icon for iPhone home screen -->
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjMWEyZTRhIi8+PHRleHQgeT0iLjllbSIgZm9udC1zaXplPSI3MCIgeD0iMTIiPvCfkrY8L3RleHQ+PC9zdmc+">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; background: #f0f2f5; min-height: 100vh; padding: 12px; padding-bottom: 30px; }

  .app { max-width: 600px; margin: 0 auto; }

  .header { background: #1a2e4a; color: white; border-radius: 16px; padding: 14px 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
  .header-icon { width: 44px; height: 44px; background: #25d366; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .header h1 { font-size: 16px; font-weight: 700; }
  .header p { font-size: 11px; opacity: 0.7; margin-top: 2px; }

  .card { background: white; border-radius: 16px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .card-title { font-size: 12px; font-weight: 700; color: #1a2e4a; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

  .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .quick-btn { padding: 7px 13px; border: 1.5px solid #e0e5ec; border-radius: 20px; font-size: 13px; color: #333; background: white; cursor: pointer; transition: all 0.15s; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .quick-btn:active, .quick-btn.active { background: #1a2e4a; color: white; border-color: #1a2e4a; }

  textarea { width: 100%; border: 1.5px solid #e0e5ec; border-radius: 12px; padding: 11px 13px; font-size: 15px; font-family: inherit; resize: none; min-height: 90px; direction: rtl; outline: none; background: #fafbfc; transition: border 0.2s; }
  textarea:focus { border-color: #1a2e4a; background: white; }

  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 10px; }
  input[type="text"] { width: 100%; border: 1.5px solid #e0e5ec; border-radius: 10px; padding: 9px 12px; font-size: 13px; font-family: inherit; direction: rtl; outline: none; background: #fafbfc; }
  input[type="text"]:focus { border-color: #1a2e4a; background: white; }
  input[type="text"]::placeholder { color: #bbb; }

  .btn-generate { width: 100%; padding: 14px; background: #1a2e4a; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 12px; transition: opacity 0.2s; }
  .btn-generate:active { opacity: 0.85; }
  .btn-generate:disabled { opacity: 0.5; }

  .result-area { display: none; }
  .result-area.visible { display: block; }

  .wa-preview { background: #e5ddd5; border-radius: 12px; padding: 12px; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23c4b5a0' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
  .bubble { background: white; border-radius: 14px 0 14px 14px; padding: 11px 14px; margin-right: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); font-size: 14px; line-height: 1.7; color: #111; direction: rtl; text-align: right; white-space: pre-wrap; word-break: break-word; }
  .bubble-meta { font-size: 10px; color: #999; text-align: left; margin-top: 4px; }

  .action-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-action { flex: 1; padding: 12px 8px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-action:active { opacity: 0.8; }
  .btn-copy { background: #f0f2f5; color: #333; }
  .btn-copy.done { background: #1a2e4a; color: white; }
  .btn-wa { background: #25d366; color: white; }

  .loading { text-align: center; padding: 20px; color: #888; font-size: 14px; }
  .error-msg { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 12px; padding: 11px 14px; color: #c0392b; font-size: 13px; margin-top: 10px; }

  .divider { height: 1px; background: #f0f2f5; margin: 12px 0; }
  .field-label { font-size: 11px; color: #999; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-icon">💬</div>
    <div>
      <h1>עוזר WhatsApp</h1>
      <p>UDATA – Data Recovery Lab</p>
    </div>
  </div>

  <!-- Quick questions -->
  <div class="card">
    <div class="card-title">⚡ שאלות נפוצות</div>
    <div class="quick-btns">
      <button class="quick-btn" onclick="setQ('כמה זמן ייקח השחזור?')">⏱ כמה זמן?</button>
      <button class="quick-btn" onclick="setQ('מה המחיר לשחזור?')">💰 מחיר?</button>
      <button class="quick-btn" onclick="setQ('האם ניתן לשחזר את המידע?')">❓ אפשרי?</button>
      <button class="quick-btn" onclick="setQ('מה הסיכויים להצליח?')">📊 סיכויים?</button>
      <button class="quick-btn" onclick="setQ('מתי המידע יהיה מוכן?')">📅 מתי מוכן?</button>
      <button class="quick-btn" onclick="setQ('האם המידע שלי בטוח?')">🔒 בטיחות?</button>
      <button class="quick-btn" onclick="setQ('אני צריך רק קובץ אחד, האם זה אפשרי?')">📁 קובץ אחד</button>
      <button class="quick-btn" onclick="setQ('תוכל לעדכן אותי מה הסטטוס?')">🔄 סטטוס</button>
      <button class="quick-btn" onclick="setQ('האם אני מחויב לשלם אם לא שחזרתם?')">💳 תשלום כישלון?</button>
    </div>

    <div class="divider"></div>

    <div class="field-label">שאלה / הודעה של הלקוח</div>
    <textarea id="q" placeholder="הדבק כאן את ההודעה של הלקוח...&#10;(אפשר בעברית, ברוסית או בכל שפה)" rows="4"></textarea>

    <div class="fields" style="margin-top:10px;">
      <div>
        <div class="field-label">מספר תיק</div>
        <input type="text" id="cn" placeholder="למשל 6298">
      </div>
      <div>
        <div class="field-label">מדיה</div>
        <input type="text" id="md" placeholder="WD HDD 1TB">
      </div>
      <div>
        <div class="field-label">סטטוס</div>
        <input type="text" id="st" placeholder="בדיאגנוסטיקה...">
      </div>
      <div>
        <div class="field-label">מחיר / הסתברות</div>
        <input type="text" id="pr" placeholder="₪2500 / 90%">
      </div>
    </div>

    <button class="btn-generate" id="genBtn" onclick="generate()">✨ צור תשובה מקצועית</button>
  </div>

  <div class="result-area" id="result">
    <div class="card">
      <div class="card-title">💬 תשובה מוכנה</div>
      <div class="wa-preview">
        <div class="bubble" id="resp"></div>
      </div>
      <div class="action-row">
        <button class="btn-action btn-copy" id="cpyBtn" onclick="copyR()">📋 העתק</button>
        <button class="btn-action btn-wa" onclick="openWA()">📲 WhatsApp</button>
      </div>
    </div>
  </div>

  <div id="load"></div>
  <div id="err"></div>

</div>

<script>
let lastR = '';

function setQ(txt) {
  document.getElementById('q').value = txt;
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('q').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function generate() {
  const q = document.getElementById('q').value.trim();
  if (!q) { document.getElementById('q').focus(); return; }

  const cn = document.getElementById('cn').value.trim();
  const md = document.getElementById('md').value.trim();
  const st = document.getElementById('st').value.trim();
  const pr = document.getElementById('pr').value.trim();

  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = '⏳ מייצר...';
  document.getElementById('result').classList.remove('visible');
  document.getElementById('err').innerHTML = '';
  document.getElementById('load').innerHTML = '<div class="loading">💭 חושב על תשובה...</div>';

  let ctx = '';
  if (cn) ctx += `תיק: ${cn}\n`;
  if (md) ctx += `מדיה: ${md}\n`;
  if (st) ctx += `סטטוס: ${st}\n`;
  if (pr) ctx += `מחיר/הסתברות: ${pr}\n`;

  const sys = `אתה עוזר מקצועי למעבדת שחזור נתונים UDATA בתל אביב (072-249-4570, בית הלל 20).
כתוב תשובות WhatsApp בעברית — ידידותיות, קצרות, מקצועיות. 
השתמש בסגנון חם עם מינימום אמוג'י.
תמיד סיים ב: "אני כאן לכל שאלה 😊" ואז: "_UDATA – Data Recovery Lab_\n📞 072-249-4570"
אל תמציא מחירים או הבטחות שלא ניתנו. השתמש ב*בולד* לדגש.
ענה רק עם הודעת ה-WhatsApp, ללא הסברים נוספים.`;

  const msg = ctx ? `פרטי תיק:\n${ctx}\nשאלת לקוח:\n${q}` : `שאלת לקוח:\n${q}`;

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 800,
        system: sys,
        messages: [{ role: 'user', content: msg }]
      })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    lastR = d.content[0].text.trim();
    const fmt = lastR.replace(/\*(.*?)\*/g,'<b>$1</b>').replace(/_(.*?)_/g,'<i>$1</i>').replace(/\n/g,'<br>');
    document.getElementById('resp').innerHTML = fmt + '<div class="bubble-meta">עכשיו ✓✓</div>';
    document.getElementById('load').innerHTML = '';
    document.getElementById('result').classList.add('visible');
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  } catch(e) {
    document.getElementById('load').innerHTML = '';
    document.getElementById('err').innerHTML = `<div class="error-msg">❌ שגיאה: ${e.message}</div>`;
  }
  btn.disabled = false; btn.textContent = '✨ צור תשובה מקצועית';
}

function copyR() {
  if (!lastR) return;
  navigator.clipboard.writeText(lastR).then(() => {
    const b = document.getElementById('cpyBtn');
    b.classList.add('done'); b.textContent = '✅ הועתק!';
    setTimeout(() => { b.classList.remove('done'); b.textContent = '📋 העתק'; }, 2000);
  });
}

function openWA() {
  if (lastR) window.open('https://wa.me/?text=' + encodeURIComponent(lastR), '_blank');
}
</script>
</body>
</html>
